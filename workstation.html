<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Titan Omega | Powered by Charan</title>
    <style>
        :root { 
            --ios-bg: #050507; --widget: rgba(30, 30, 35, 0.75); 
            --accent: #0a84ff; --glow: #00f2ff; --glass: saturate(200%) blur(30px);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: var(--ios-bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* --- NAVIGATION --- */
        nav { width: 280px; background: #000; border-right: 1px solid var(--border); padding: 35px 20px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; overflow-y: auto; }
        .nav-btn { padding: 15px 20px; border-radius: 14px; background: #18181b; color: #a1a1aa; border: 1px solid transparent; cursor: pointer; text-align: left; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        .nav-btn:hover, .nav-btn.active { color: #fff; background: var(--accent); border-color: var(--glow); transform: translateX(8px); box-shadow: 0 5px 20px rgba(10, 132, 255, 0.4); }
        .nav-sep { color: #52525b; font-size: 0.75rem; font-weight: 800; margin: 20px 0 5px 10px; text-transform: uppercase; letter-spacing: 1.5px; }

        /* --- VIEWPORT --- */
        main { flex: 1; padding: 45px; overflow-y: auto; background: radial-gradient(at top right, #1e1e3f, #050507); }
        .view { display: none; animation: quantum_boot 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .view.active { display: block; }
        @keyframes quantum_boot { from { opacity: 0; transform: translateY(20px); filter: blur(15px); } }

        /* --- GLASS UI --- */
        .glass-card { background: var(--widget); backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: 30px; padding: 30px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        input, select, textarea { background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: #fff; padding: 18px; border-radius: 15px; width: 100%; margin-bottom: 15px; outline: none; }
        .btn-p { background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; }

        /* --- APP SPECIFIC --- */
        #word-editor { background: #fff; color: #1c1c1e; min-height: 450px; padding: 50px; border-radius: 15px; outline: none; font-size: 1.1rem; line-height: 1.6; }
        #excel-table { border-collapse: collapse; width: 100%; background: #fff; border-radius: 10px; overflow: hidden; }
        #excel-table td { border: 1px solid #ddd; height: 35px; }
        #excel-table input { border: none; background: transparent; color: #000; padding: 5px; width: 100%; height: 100%; }
        #code-area { background: #000; color: #00f2ff; font-family: monospace; height: 400px; padding: 20px; border-radius: 15px; }
        .c-screen { background: #000; padding: 25px; border-radius: 20px; text-align: right; border: 1px solid var(--glow); margin-bottom: 15px; }
        .c-main { font-size: 3rem; color: var(--glow); font-family: monospace; }
        .c-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .ckey { background: #1c1c1e; color: #fff; padding: 20px; border-radius: 12px; cursor: pointer; font-weight: bold; border: 1px solid var(--border); }
        .ckey:hover { background: var(--glow); color: #000; }
        .ios-widget { background: var(--widget); border-radius: 32px; padding: 25px; border: 1px solid var(--border); height: 170px; display: flex; flex-direction: column; justify-content: space-between; }
    </style>
</head>
<body>

<nav>
    <div style="padding: 0 10px 30px 10px;">
        <h1 style="margin:0; color: #fff;">TITAN OMEGA</h1>
        <div style="color:var(--glow); font-weight:bold; font-size: 0.8rem;">POWERED BY CHARAN</div>
    </div>
    <div class="nav-sep">General</div>
    <button class="nav-btn active" onclick="sw('home')">◈ Dashboard</button>
    <button class="nav-btn" onclick="sw('calc')">◈ Scientific Lab</button>
    <button class="nav-btn" onclick="sw('world')">◈ World Clock</button>
    <div class="nav-sep">Titan Office</div>
    <button class="nav-btn" onclick="sw('word')">◈ Titan Word</button>
    <button class="nav-btn" onclick="sw('excel')">◈ Titan Excel</button>
    <button class="nav-btn" onclick="sw('code')">◈ Dev Studio</button>
    <button class="nav-btn" onclick="sw('term')">◈ Terminal OS</button>
</nav>

<main>
    <div id="v-home" class="view active">
        <h1>Welcome, Charan</h1>
        <div class="grid">
            <div class="glass-card"><h3>System Time</h3><h1 id="local-clk" style="font-size: 4rem; color: var(--glow);">00:00:00</h1></div>
            <div class="glass-card"><h3>Quick Notes</h3><textarea id="notes" style="height:150px" onkeyup="saveData()"></textarea></div>
        </div>
    </div>

    <div id="v-calc" class="view">
        <div class="glass-card" style="max-width: 800px; margin: auto;">
            <div class="c-screen"><div id="c-hist" style="color:#444; height:20px"></div><div class="c-main" id="c-scr">0</div></div>
            <div class="c-grid">
                <button class="ckey" style="color:red" onclick="cClr()">AC</button><button class="ckey" onclick="cDel()">⌫</button><button class="ckey" onclick="c('/')">÷</button><button class="ckey" onclick="c('*')">×</button><button class="ckey" onclick="c('7')">7</button><button class="ckey" onclick="c('8')">8</button>
                <button class="ckey" onclick="c('9')">9</button><button class="ckey" onclick="c('-')">−</button><button class="ckey" onclick="c('4')">4</button><button class="ckey" onclick="c('5')">5</button><button class="ckey" onclick="c('6')">6</button><button class="ckey" onclick="c('+')">+</button>
                <button class="ckey" onclick="c('1')">1</button><button class="ckey" onclick="c('2')">2</button><button class="ckey" onclick="c('3')">3</button><button class="ckey" style="background:var(--accent)" onclick="cExe()">=</button><button class="ckey" onclick="c('0')" style="grid-column: span 2">0</button>
            </div>
        </div>
    </div>

    <div id="v-word" class="view">
        <div style="background:#eee; padding:10px; border-radius:10px 10px 0 0; display:flex; gap:10px;">
            <button class="btn-p" style="width:50px; padding:5px" onclick="document.execCommand('bold')">B</button>
            <button class="btn-p" style="width:50px; padding:5px" onclick="document.execCommand('italic')">I</button>
        </div>
        <div id="word-editor" contenteditable="true">Start typing, Charan...</div>
    </div>

    <div id="v-excel" class="view">
        <div class="glass-card" style="padding:0; background:#fff; overflow:auto;"><table id="excel-table"></table></div>
    </div>

    <div id="v-code" class="view">
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <textarea id="code-area" placeholder="Write HTML here..." onkeyup="renderPreview()"></textarea>
            <div id="preview-pane" style="background:#fff; color:#000; border-radius:15px; padding:20px;"></div>
        </div>
    </div>

    <div id="v-term" class="view">
        <div style="background:#000; padding:30px; border-radius:20px; border: 1px solid var(--glow); font-family: monospace; height: 500px;">
            <div style="color: var(--glow)">TITAN OMEGA [v10.4.0]</div>
            <div style="color: #fff">DEV: CHARAN</div>
            <div id="t-output"></div>
            <div style="display:flex;"><span>> </span><input type="text" id="t-input" style="background:transparent; border:none; color:var(--glow); flex:1;" onkeydown="runCmd(event)"></div>
        </div>
    </div>

    <div id="v-world" class="view"><div class="grid" id="clock-vault"></div></div>
</main>

<script>
    function sw(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-'+id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // EXCEL
    const et = document.getElementById('excel-table');
    for(let i=0; i<15; i++) {
        let r = et.insertRow();
        for(let j=0; j<8; j++) r.insertCell().innerHTML = `<input type="text">`;
    }

    // CLOCK
    setInterval(() => {
        document.getElementById('local-clk').innerText = new Date().toLocaleTimeString();
        renderWorld();
    }, 1000);

    const zones = [{n:"Nalgonda", z:"Asia/Kolkata"}, {n:"New York", z:"America/New_York"}, {n:"Tokyo", z:"Asia/Tokyo"}];
    function renderWorld() {
        const v = document.getElementById('clock-vault'); if(!v) return;
        v.innerHTML = '';
        zones.forEach(z => {
            const t = new Date().toLocaleTimeString('en-US', {timeZone: z.z, hour:'numeric', minute:'2-digit'});
            v.innerHTML += `<div class="ios-widget"><div>${z.n}</div><div style="font-size:3rem">${t}</div></div>`;
        });
    }

    // MATH & SYSTEM
    let scr = document.getElementById('c-scr');
    function c(v) { if(scr.innerText === '0') scr.innerText = ''; scr.innerText += v; }
    function cClr() { scr.innerText = '0'; }
    function cDel() { scr.innerText = scr.innerText.slice(0,-1) || '0'; }
    function cExe() { try { scr.innerText = eval(scr.innerText); } catch { scr.innerText = "Error"; } }
    function renderPreview() { document.getElementById('preview-pane').innerHTML = document.getElementById('code-area').value; }
    function saveData() { localStorage.setItem('notes_charan', document.getElementById('notes').value); }
    document.getElementById('notes').value = localStorage.getItem('notes_charan') || '';

    function runCmd(e) {
        if(e.key === 'Enter') {
            const cmd = e.target.value.toLowerCase();
            const out = document.getElementById('t-output');
            out.innerHTML += `<div>> ${cmd}</div>`;
            if(cmd === 'charan') out.innerHTML += `<div style="color:var(--glow)">System Architect Recognized.</div>`;
            else if(cmd === 'help') out.innerHTML += `<div>cmds: help, clear, charan</div>`;
            else if(cmd === 'clear') out.innerHTML = '';
            e.target.value = '';
        }
    }
</script>
</body>
</html>
