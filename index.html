<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Omega Elite | Powered by Charan</title>
    <style>
        :root { 
            --bg: #030305; --card: rgba(28, 28, 35, 0.9); 
            --accent: #0a84ff; --glow: #00f2ff; --glass: saturate(200%) blur(30px);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* --- NAVIGATION --- */
        nav { width: 280px; background: #000; border-right: 1px solid var(--border); padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { padding: 15px; border-radius: 12px; background: #15151a; color: #a1a1aa; border: 1px solid var(--border); cursor: pointer; text-align: left; font-weight: 700; }
        .nav-btn:hover, .nav-btn.active { color: #fff; background: var(--accent); border-color: var(--glow); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .nav-sep { font-size: 0.7rem; color: #555; text-transform: uppercase; margin-top: 20px; letter-spacing: 1px; }

        /* --- VIEWPORT --- */
        main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top, #151525, #030305); }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        /* --- CARDS --- */
        .glass-card { background: var(--card); backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 25px; }
        
        /* --- SCIENTIFIC CALCULATOR --- */
        .calc-box { max-width: 600px; background: #000; padding: 20px; border-radius: 20px; border: 1px solid var(--glow); margin: auto; }
        .calc-screen { height: 80px; text-align: right; font-size: 2.5rem; color: var(--glow); font-family: monospace; padding: 10px; overflow: hidden; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .calc-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .k { background: #1c1c22; color: #fff; border: 1px solid #333; padding: 15px 5px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        .k:hover { background: #333; }
        .k-op { color: var(--accent); }
        .k-exe { background: var(--accent); }

        /* --- TITAN OFFICE --- */
        .toolbar { background: #f0f0f5; padding: 10px; border-radius: 12px 12px 0 0; display: flex; gap: 10px; border: 1px solid #ccc; }
        .tool-btn { padding: 5px 15px; cursor: pointer; font-weight: bold; background: white; border: 1px solid #ccc; border-radius: 5px; }
        #word-editor { background: white; color: black; padding: 40px; min-height: 400px; border-radius: 0 0 12px 12px; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 1.1rem; }
        .excel-wrap { background: white; overflow: auto; max-height: 500px; border-radius: 12px; }
        table { border-collapse: collapse; width: 100%; color: black; }
        td { border: 1px solid #ddd; padding: 0; min-width: 100px; }
        td input { width: 100%; border: none; padding: 10px; font-size: 0.9rem; outline: none; }

        /* --- WORLD CLOCK --- */
        .clock-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .clock-card { background: #15151a; padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .clock-time { font-size: 2.5rem; color: var(--glow); margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <div style="margin-bottom: 30px;">
        <h1 style="margin:0; font-size: 1.8rem;">TITAN OMEGA</h1>
        <div style="color:var(--glow); font-size: 0.8rem; font-weight: bold;">POWERED BY CHARAN</div>
    </div>

    <div class="nav-sep">Main Console</div>
    <button class="nav-btn active" onclick="sw('home')">◈ Dashboard</button>
    <button class="nav-btn" onclick="sw('calc')">◈ Scientific Lab</button>
    <button class="nav-btn" onclick="sw('clock')">◈ World Chronos</button>

    <div class="nav-sep">Office Suite</div>
    <button class="nav-btn" onclick="sw('word')">◈ Titan Word</button>
    <button class="nav-btn" onclick="sw('excel')">◈ Titan Excel</button>
    <button class="nav-btn" onclick="sw('code')">◈ Dev Studio</button>
</nav>

<main>
    <div id="v-home" class="view active">
        <h1>Welcome Back, Charan</h1>
        <div class="glass-card">
            <h3>Nalgonda Local Time</h3>
            <h1 id="main-clk" style="font-size: 5rem; color: var(--glow); margin:0;">00:00:00</h1>
        </div>
    </div>

    <div id="v-calc" class="view">
        <div class="calc-box">
            <div class="calc-screen" id="scr">0</div>
            <div class="calc-grid">
                <button class="k" style="color:red" onclick="clr()">AC</button>
                <button class="k" onclick="add('(')">(</button>
                <button class="k" onclick="add(')')">)</button>
                <button class="k k-op" onclick="del()">DEL</button>
                <button class="k k-op" onclick="add('/')">÷</button>

                <button class="k" onclick="add('Math.sin(')">sin</button>
                <button class="k" onclick="add('7')">7</button>
                <button class="k" onclick="add('8')">8</button>
                <button class="k" onclick="add('9')">9</button>
                <button class="k k-op" onclick="add('*')">×</button>

                <button class="k" onclick="add('Math.cos(')">cos</button>
                <button class="k" onclick="add('4')">4</button>
                <button class="k" onclick="add('5')">5</button>
                <button class="k" onclick="add('6')">6</button>
                <button class="k k-op" onclick="add('-')">−</button>

                <button class="k" onclick="add('Math.log10(')">log</button>
                <button class="k" onclick="add('1')">1</button>
                <button class="k" onclick="add('2')">2</button>
                <button class="k" onclick="add('3')">3</button>
                <button class="k k-op" onclick="add('+')">+</button>

                <button class="k" onclick="add('Math.PI')">π</button>
                <button class="k" onclick="add('0')">0</button>
                <button class="k" onclick="add('.')">.</button>
                <button class="k" onclick="add('**')">xʸ</button>
                <button class="k k-exe" onclick="exe()">=</button>
            </div>
        </div>
    </div>

    <div id="v-word" class="view">
        <div class="toolbar">
            <button class="tool-btn" onclick="document.execCommand('bold')">B</button>
            <button class="tool-btn" onclick="document.execCommand('italic')">I</button>
            <button class="tool-btn" onclick="document.execCommand('underline')">U</button>
            <button class="tool-btn" onclick="document.execCommand('fontSize', false, '7')">Large</button>
        </div>
        <div id="word-editor" contenteditable="true">Start your document, Charan...</div>
    </div>

    <div id="v-excel" class="view">
        <div class="excel-wrap">
            <table id="ex-table"></table>
        </div>
    </div>

    <div id="v-code" class="view">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <textarea id="c-in" style="height:500px; background:#000; color:#0f0; padding:20px; border-radius:15px; border:1px solid var(--glow);" placeholder="Type HTML here..." onkeyup="run()"></textarea>
            <div id="c-out" style="background:white; border-radius:15px; color:black; padding:20px; height:500px; overflow:auto;"></div>
        </div>
    </div>

    <div id="v-clock" class="view">
        <div class="clock-grid" id="clocks"></div>
    </div>
</main>

<script>
    function sw(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-'+id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // CALCULATOR LOGIC
    let s = document.getElementById('scr');
    function add(v) { if(s.innerText === '0') s.innerText = ''; s.innerText += v; }
    function clr() { s.innerText = '0'; }
    function del() { s.innerText = s.innerText.slice(0, -1) || '0'; }
    function exe() { try { s.innerText = eval(s.innerText); } catch { s.innerText = 'Error'; } }

    // EXCEL TABLE GENERATOR
    const table = document.getElementById('ex-table');
    for(let i=0; i<30; i++) {
        let row = table.insertRow();
        for(let j=0; j<10; j++) {
            let cell = row.insertCell();
            cell.innerHTML = `<input type="text" placeholder="${String.fromCharCode(65+j)}${i+1}">`;
        }
    }

    // WORLD CLOCKS
    const zones = [
        { city: "Nalgonda", zone: "Asia/Kolkata" },
        { city: "London", zone: "Europe/London" },
        { city: "New York", zone: "America/New_York" },
        { city: "Tokyo", zone: "Asia/Tokyo" }
    ];

    function updateClocks() {
        const now = new Date();
        document.getElementById('main-clk').innerText = now.toLocaleTimeString();
        
        const clockContainer = document.getElementById('clocks');
        if(!clockContainer) return;
        clockContainer.innerHTML = '';
        
        zones.forEach(z => {
            const time = new Date().toLocaleTimeString('en-GB', { timeZone: z.zone, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            clockContainer.innerHTML += `
                <div class="clock-card">
                    <div style="color:var(--accent); font-weight:bold;">${z.city}</div>
                    <div class="clock-time">${time}</div>
                </div>
            `;
        });
    }
    setInterval(updateClocks, 1000);

    // DEV STUDIO
    function run() { document.getElementById('c-out').innerHTML = document.getElementById('c-in').value; }
</script>
</body>
</html>
